<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Adaptalyfe - Grow with Guidance. Thrive with Confidence.</title>
    <link rel="stylesheet" href="/force-hide-errors.css">
    <script src="/block-error-modal.js?v=2"></script>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, proxy-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Surrogate-Control" content="no-store">
    <meta name="description" content="Adaptalyfe - Grow with Guidance. Thrive with Confidence. Helping individuals with developmental disabilities build independence through daily task management, financial planning, mood tracking, and comprehensive support features." />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#22c55e" />
    <link rel="icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Adaptalyfe" />

    <!-- Instant loading screen — pure CSS/HTML, no JS needed, shows before React loads -->
    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 40%, #a7f3d0 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        transition: opacity 0.4s ease;
      }
      #app-loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loading .logo-circle {
        width: 88px;
        height: 88px;
        border-radius: 50%;
        background: linear-gradient(135deg, #10b981, #059669);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        box-shadow: 0 8px 32px rgba(16,185,129,0.35);
      }
      #app-loading .logo-text {
        font-size: 38px;
        font-weight: 900;
        color: white;
        line-height: 1;
      }
      #app-loading h1 {
        font-size: 26px;
        font-weight: 800;
        color: #065f46;
        margin: 0 0 6px;
        letter-spacing: -0.5px;
      }
      #app-loading p {
        font-size: 13px;
        color: #6b7280;
        margin: 0 0 36px;
        text-align: center;
        padding: 0 24px;
      }
      #app-loading .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #d1fae5;
        border-top-color: #10b981;
        border-radius: 50%;
        animation: spin 0.85s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #app-loading .retry-btn {
        display: none;
        margin-top: 16px;
        padding: 12px 28px;
        background: #10b981;
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 14px rgba(16,185,129,0.4);
      }
      #app-loading .slow-msg {
        display: none;
        font-size: 13px;
        color: #6b7280;
        margin-top: 8px;
        text-align: center;
      }
    </style>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .catch(() => {});
        });
      }
    </script>
  </head>
  <body>
    <!-- Loading screen shown immediately before React mounts -->
    <div id="app-loading">
      <div class="logo-circle">
        <span class="logo-text">A</span>
      </div>
      <h1>Adaptalyfe</h1>
      <p>Grow with Guidance. Thrive with Confidence.</p>
      <div class="spinner" id="loading-spinner"></div>
      <div class="slow-msg" id="slow-msg">Taking a moment — almost there...</div>
      <button class="retry-btn" id="retry-btn" onclick="window.location.reload()">Tap to Retry</button>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Loading screen controller + Railway keep-alive ping -->
    <script>
      // 1. Ping Railway immediately to wake it up before React even loads.
      //    This runs as soon as the HTML parses — Railway starts waking up
      //    while the browser is still downloading JS bundles.
      (function() {
        try {
          fetch('/api/ping', { method: 'GET', cache: 'no-store' })
            .then(function(r) {
              if (r.ok) console.log('[Adaptalyfe] Server is awake');
            })
            .catch(function() {
              console.warn('[Adaptalyfe] Server ping failed — may be waking up');
            });
        } catch(e) {}
      })();

      // 2. Progressive messages while loading
      var _slowTimer = setTimeout(function() {
        var msg = document.getElementById('slow-msg');
        if (msg) { msg.style.display = 'block'; msg.textContent = 'Starting up — almost there...'; }
      }, 5000);
      var _retryTimer = setTimeout(function() {
        var msg = document.getElementById('slow-msg');
        var btn = document.getElementById('retry-btn');
        if (msg) msg.textContent = 'This is taking longer than usual.';
        if (btn) btn.style.display = 'block';
        // Auto-ping again to keep waking Railway
        try { fetch('/api/ping', { cache: 'no-store' }).catch(function(){}); } catch(e){}
      }, 15000);
      var _autoRetry = setTimeout(function() {
        // Auto-reload once after 40s — server should be up by then
        var el = document.getElementById('app-loading');
        if (el && !el.classList.contains('hidden')) {
          console.warn('[Adaptalyfe] Auto-reloading after timeout');
          window.location.reload();
        }
      }, 40000);

      // 3. Called by React main.tsx once app is mounted — hides this screen
      window.__hideAppLoading = function() {
        clearTimeout(_slowTimer);
        clearTimeout(_retryTimer);
        clearTimeout(_autoRetry);
        var el = document.getElementById('app-loading');
        if (el) {
          el.classList.add('hidden');
          setTimeout(function() { if (el && el.parentNode) el.parentNode.removeChild(el); }, 450);
        }
      };

      // 4. Force old service workers to update immediately
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(reg) {
            reg.update(); // check for new SW version right now
          });
        }).catch(function(){});
      }
    </script>
  </body>
</html>
